services:
  oryxvault-api:
    image: oryxvault-ia-oryxvault-api
    container_name: oryxvault
    ports:
      - "8000:8000"   # ← this was missing
    environment:
      IA_ACCESS_KEY: ${IA_ACCESS_KEY}
      IA_SECRET_KEY: ${IA_SECRET_KEY}
      ORYX_JWT_SECRET: ${ORYX_JWT_SECRET}
    volumes:
      - oryx_data:/data
    restart: unless-stopped

volumes:
  oryx_data:
