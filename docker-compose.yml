version: '3.8'
services:
  oryxvault-api:
    build: ./backend
    container_name: oryxvault
    ports:
      - "8000:8000"
    environment:
      - IA_ACCESS_KEY=${IA_ACCESS_KEY}
      - IA_SECRET_KEY=${IA_SECRET_KEY}
      - IA_COLLECTION=${IA_COLLECTION:-opensource}
      - ORYX_JWT_SECRET=${ORYX_JWT_SECRET:-oryx-secret-change-me}
    volumes:
      - oryx_data:/data
    restart: unless-stopped

volumes:
  oryx_data:
